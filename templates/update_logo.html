{% extends 'layout.html' %}

{% block title %}Atualizar Logo - Área de Membros{% endblock %}

{% block content %}
<h3 class="mb-3">Atualizar Logo do Site</h3>
<div class="mb-4">
    <p>Logo atual:</p>
    <img src="{{ logo }}" alt="Logo atual" style="height: 80px;">
</div>
<form method="POST" enctype="multipart/form-data">
  <div class="mb-3">
    <label for="logo" class="form-label">Selecione uma nova imagem para o logo</label>
    <input class="form-control" type="file" id="logo" name="logo" accept="image/*" required>
  </div>
  <button type="submit" class="btn btn-primary">Atualizar</button>
  <a href="/dashboard" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
